# WARNING: In production, use sealed-secrets, external-secrets-operator, or a
# vault integration. Never commit real secrets to git.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oil-pipeline.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "oil-pipeline.labels" . | nindent 4 }}
type: Opaque
data:
  # Shared credentials (ingestor / lakehouse)
  DB_USER: {{ .Values.postgres.credentials.username | b64enc | quote }}
  DB_PASSWORD: {{ .Values.postgres.credentials.password | b64enc | quote }}

  # PostgreSQL bootstrap env vars
  POSTGRES_DB: {{ .Values.postgres.credentials.database | b64enc | quote }}
  POSTGRES_USER: {{ .Values.postgres.credentials.username | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.credentials.password | b64enc | quote }}

  # API credentials
  OIL_API_PG_USER: {{ .Values.postgres.credentials.username | b64enc | quote }}
  OIL_API_PG_PASSWORD: {{ .Values.postgres.credentials.password | b64enc | quote }}
