apiVersion: v1
kind: Service
metadata:
  name: oil-pipeline-postgres
  namespace: oil-pipeline
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: oil-pipeline
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: oil-pipeline
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
