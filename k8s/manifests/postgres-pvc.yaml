apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: oil-pipeline
  labels:
    app.kubernetes.io/name: postgres-data
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: oil-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: ""  # Omitted — uses the cluster's default StorageClass
