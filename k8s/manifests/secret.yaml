# WARNING: In production, use sealed-secrets, external-secrets-operator, or a
# vault integration. Never commit real secrets to git. These values are included
# only for local / demo cluster use.
apiVersion: v1
kind: Secret
metadata:
  name: oil-pipeline-secret
  namespace: oil-pipeline
  labels:
    app.kubernetes.io/name: oil-pipeline-secret
    app.kubernetes.io/part-of: oil-pipeline
type: Opaque
data:
  # echo -n "arash"               | base64  -> YXJhc2g=
  # echo -n "warehouse_dev_2026"  | base64  -> d2FyZWhvdXNlX2Rldl8yMDI2
  # echo -n "oil_warehouse"       | base64  -> b2lsX3dhcmVob3VzZQ==

  # Shared credentials (ingestor / lakehouse)
  DB_USER: "YXJhc2g="
  DB_PASSWORD: "d2FyZWhvdXNlX2Rldl8yMDI2"

  # PostgreSQL container bootstrap env vars
  POSTGRES_DB: "b2lsX3dhcmVob3VzZQ=="
  POSTGRES_USER: "YXJhc2g="
  POSTGRES_PASSWORD: "d2FyZWhvdXNlX2Rldl8yMDI2"

  # API credentials (OIL_API_ prefix maps to pydantic-settings fields)
  OIL_API_PG_USER: "YXJhc2g="
  OIL_API_PG_PASSWORD: "d2FyZWhvdXNlX2Rldl8yMDI2"
