apiVersion: apps/v1
kind: Deployment
metadata:
  name: oil-pipeline-api
  namespace: oil-pipeline
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: oil-pipeline
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # Never reduce capacity below desired count
      maxSurge: 1         # Allow one extra pod during rollout
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/part-of: oil-pipeline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: oil-pipeline
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h oil-pipeline-postgres -U arash -d oil_warehouse; do
                echo "PostgreSQL not ready — retrying in 2s"
                sleep 2
              done
              echo "PostgreSQL is ready."
      containers:
        - name: api
          image: arash/oil-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # PostgreSQL connection (OIL_API_ prefix -> pydantic-settings)
            - name: OIL_API_PG_HOST
              valueFrom:
                configMapKeyRef:
                  name: oil-pipeline-config
                  key: OIL_API_PG_HOST
            - name: OIL_API_PG_PORT
              valueFrom:
                configMapKeyRef:
                  name: oil-pipeline-config
                  key: OIL_API_PG_PORT
            - name: OIL_API_PG_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: oil-pipeline-config
                  key: OIL_API_PG_DATABASE
            - name: OIL_API_PG_USER
              valueFrom:
                secretKeyRef:
                  name: oil-pipeline-secret
                  key: OIL_API_PG_USER
            - name: OIL_API_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oil-pipeline-secret
                  key: OIL_API_PG_PASSWORD
            # Lakehouse path: {base}/data/serving/ = /opt/lakehouse/data/serving/
            - name: OIL_API_LAKEHOUSE_BASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: oil-pipeline-config
                  key: OIL_API_LAKEHOUSE_BASE_PATH
          volumeMounts:
            # Mount lakehouse PVC at /opt/lakehouse/data (read-only)
            # API resolves serving path as {LAKEHOUSE_BASE_PATH}/data/serving/
            - name: lakehouse-data
              mountPath: /opt/lakehouse/data
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: lakehouse-data
          persistentVolumeClaim:
            claimName: lakehouse-data
            readOnly: true
