# NOTE: For production, consider using a StatefulSet for PostgreSQL, or better
# yet, a managed database service (AWS RDS, Cloud SQL, Azure Database).
#
# Database init scripts (database/init/*.sql) would be applied by:
#   a) Baking them into a custom postgres image, OR
#   b) Mounting them via a ConfigMap to /docker-entrypoint-initdb.d/
# For this portfolio demo, apply them manually after first startup:
#   kubectl exec -n oil-pipeline deploy/oil-pipeline-postgres -- psql -U arash -d oil_warehouse -f /scripts/...
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oil-pipeline-postgres
  namespace: oil-pipeline
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: oil-pipeline
spec:
  replicas: 1
  # Recreate ensures the old pod releases the PVC before the new one starts.
  # RollingUpdate would leave two pods competing for the same ReadWriteOnce volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: oil-pipeline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: oil-pipeline
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: oil-pipeline-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: oil-pipeline-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oil-pipeline-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - arash
                - -d
                - oil_warehouse
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - arash
                - -d
                - oil_warehouse
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
