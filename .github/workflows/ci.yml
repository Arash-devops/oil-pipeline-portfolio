name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # Lint Python (matrix: ingestor / lakehouse / api)
  # ---------------------------------------------------------------------------
  lint-python:
    name: Lint Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ingestor, lakehouse, api]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check services/${{ matrix.service }}/

      - name: ruff format --check
        run: ruff format --check services/${{ matrix.service }}/

  # ---------------------------------------------------------------------------
  # Lint Frontend (ESLint)
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # API tests (httpx + pytest, no real database)
  # ---------------------------------------------------------------------------
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install API dependencies
        run: pip install -r requirements.txt
        working-directory: services/api

      - name: Run API tests
        run: python -m pytest tests/ -v --tb=short
        working-directory: services/api

  # ---------------------------------------------------------------------------
  # Ingestor tests (placeholder — add real tests as the service matures)
  # ---------------------------------------------------------------------------
  test-ingestor:
    name: Test Ingestor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/ingestor/requirements.txt

      - name: Install ingestor dependencies
        run: pip install -r requirements.txt
        working-directory: services/ingestor

      - name: Run ingestor tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests directory found — skipping"
          fi
        working-directory: services/ingestor

  # ---------------------------------------------------------------------------
  # Lakehouse tests (placeholder — add real tests as the service matures)
  # ---------------------------------------------------------------------------
  test-lakehouse:
    name: Test Lakehouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/lakehouse/requirements.txt

      - name: Install lakehouse dependencies
        run: pip install -r requirements.txt
        working-directory: services/lakehouse

      - name: Run lakehouse tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests directory found — skipping"
          fi
        working-directory: services/lakehouse

  # ---------------------------------------------------------------------------
  # Docker build (matrix: all three service images)
  # Only runs after lint and API tests pass
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint-python, test-api]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ingestor
            context: services/ingestor
          - service: lakehouse
            context: services/lakehouse
          - service: api
            context: services/api
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: arash/oil-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
