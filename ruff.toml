target-version = "py313"
line-length = 120

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]

ignore = [
    "E501",
    "B008",
    "SIM108",
]

[lint.per-file-ignores]
"**/tests/**" = ["F401", "F811", "E712", "B011", "SIM300"]

[lint.isort]
known-first-party = ["app", "src"]

[format]
quote-style = "double"
indent-style = "space"
